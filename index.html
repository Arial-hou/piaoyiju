        const buyCost = item.buyPrice;
        const rentCostPerTime = item.rentPrice;

        const costPerUse = buyCost / Math.max(buyOrRentState.useCount, 1);

        const threeYearBuyCost = buyCost + item.maintainCost * 3;
        const threeYearRentCost = rentCostPerTime * buyOrRentState.useCount * 3;
        
        let advice = '', detailReason = '', frequencyLevel = '', frequencyDesc = '', frequencyColor = '';
        
        if (buyOrRentState.useCount <= 15) {
          advice = '建议租用';
          frequencyLevel = '低频使用';
          frequencyDesc = '一年用不到15次，属于低频使用';
          frequencyColor = 'amber';
          detailReason = `一年就用${buyOrRentState.useCount}次，租用的总成本才¥${totalRentCost}，比买省下¥${buyCost - totalRentCost}。而且不用考虑存放、维护、搬家带走的问题。`;
        } else if (buyOrRentState.useCount >= 40) {
          advice = '建议购买';
          frequencyLevel = '高频使用';
          frequencyDesc = '一年用超过40次，属于高频使用';
          frequencyColor = 'primary';
          detailReason = `一年用${buyOrRentState.useCount}次，每次成本才¥${costPerUse.toFixed(1)}，租用的总成本已经¥${totalRentCost}了。买下来长期用更划算，还能随时想用就用。`;
        } else {
          advice = '建议租用';
          frequencyLevel = '中频使用';

    function copyToClipboard(text, type) {
      navigator.clipboard.writeText(text);
      movingState.copied[type] = true;
      renderPage();
      setTimeout(() => { movingState.copied[type] = false; renderPage(); }, 2000);
    }

    // ==================== 主渲染函数 ====================
    function renderPage() {
      const main = document.getElementById('main-content');
      switch(currentView) {
        case 'home': main.innerHTML = renderHome(); break;
        case 'recommend': main.innerHTML = renderRecommend(); break;
        case 'buyOrRent': main.innerHTML = renderBuyOrRent(); break;
        case 'moving': main.innerHTML = renderMoving(); break;
      }
    }

    // ==================== 初始化 ====================
    document.addEventListener('DOMContentLoaded', function() { renderPage(); });
  </script>
</body>
</html>
