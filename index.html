  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Noto Sans SC', sans-serif; }
    
    /* 圆环进度条动画 */
    .circular-chart { display: block; margin: 0 auto; max-width: 80%; max-height: 250px; }
    .circle-bg { fill: none; stroke: #E7E5E4; stroke-width: 3.8; }
    .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; animation: progress 1.5s ease-out forwards; }
    @keyframes progress { 0% { stroke-dasharray: 0 100; } }
    
    /* 数字滚动动画 */
    .count-up { animation: countUp 1.2s ease-out forwards; opacity: 0; }
    @keyframes countUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    /* 卡片入场动画 */
    .stagger-item { opacity: 0; animation: fadeInUp 0.6s ease-out forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    
    /* 骨架屏 */
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }

    /* 按钮点击反馈 */

    /* 页面切换 */
    .page-enter { animation: pageEnter 0.4s ease-out; }
    @keyframes pageEnter { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    
    /* 标签选中 */
    .tag-select { transition: all 0.2s ease; cursor: pointer; }
    .tag-select.selected { background-color: #10B981; color: white; border-color: #10B981; }
    
    /* 滑块自定义 */
    input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 8px; border-radius: 4px; background: #E7E5E4; outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #10B981; cursor: pointer; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.15); transition: transform 0.2s; }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); }
    
    /* 自定义滚动条 */

    ::-webkit-scrollbar-thumb { background: #D6D3D1; border-radius: 3px; }
    
    /* 脉冲动画 */

    @keyframes pulseRing { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.3); opacity: 0; } }
  </style>
</head>

    function AnimatedNumber({ value, duration = 1500 }) {
      const [displayValue, setDisplayValue] = useState(0);
      
      useEffect(() => {
        const startTime = Date.now();
        const timer = setInterval(() => {
          const elapsed = Date.now() - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const easeOut = 1 - Math.pow(1 - progress, 3);
          setDisplayValue(Math.round(easeOut * value));
          if (progress >= 1) clearInterval(timer);
        }, 16);
        return () => clearInterval(timer);
      }, [value, duration]);
      
      return <span>{displayValue}</span>;
    }

        <div className="page-enter pb-8">
          <Header title="买还是租" subtitle="这些东西，买了可能吃灰，我帮你算" onBack={onBack} />

          {/* 物品选择 */}
          <div className="bg-white rounded-2xl p-5 mb-4 shadow-sm">
            <label className="block text-sm font-medium text-stone-700 mb-3">选择物品</label>
            <div className="grid grid-cols-2 gap-2 max-h-64 overflow-y-auto">
              {buyOrRentItems.map(item => (
                <button
                  key={item.id}
                  onClick={() => { setSelectedItem(item); setShowResult(false); }}
                  className={`btn-press p-3 rounded-xl text-left border-2 transition-all ${
                    selectedItem?.id === item.id
                      ? 'border-primary-500 bg-primary-50'
                      : 'border-transparent bg-stone-50 hover:bg-stone-100'
                  }`}
                >
                  <div className="text-2xl mb-1">{item.icon}</div>
                  <div className="text-sm font-medium text-stone-900">{item.name}</div>
                  <div className="text-xs text-stone-500">买¥{item.buyPrice}/租¥{item.rentPrice}</div>
                </button>
              ))}
            </div>
          </div>

          {selectedItem && (
            <>
              {/* 使用频率 */}
              <div className="bg-white rounded-2xl p-5 mb-4 shadow-sm">
                <label className="block text-sm font-medium text-stone-700 mb-3">
                  预计一年用多少次：<span className="text-primary-600 font-bold">{useCount}次</span>
                </label>
                <input
                  type="range"
                  min="1"
                  max="100"
                  value={useCount}
                  onChange={(e) => { setUseCount(Number(e.target.value)); setShowResult(false); }}
                  className="w-full"
                />
                <div className="flex justify-between text-xs text-stone-400 mt-1">
                  <span>1次</span>
                  <span>100次</span>
                </div>
              </div>

              {/* 计算按钮 */}
              <button
                onClick={calculate}
                className="btn-press w-full bg-primary-500 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-primary-200 hover:bg-primary-600 transition-colors mb-4"
              >
                <div className="flex items-center justify-center">
                  <IconTrendingUp />
                  <span className="ml-2">帮我算算</span>
                </div>
              </button>
            </>
          )}

          {/* 结果 */}
          {showResult && result && (
            <div className="space-y-4">
              {/* 对比卡片 */}
              <div className="grid grid-cols-2 gap-3">
                <div className="bg-white rounded-2xl p-4 shadow-sm">
                  <div className="text-xs text-stone-500 mb-1">购买方案</div>
                  <div className="text-2xl font-bold text-stone-900">¥{result.buyCost}</div>
                  <div className="text-xs text-stone-400 mt-1">一次性支出</div>
                  <div className="mt-3 pt-3 border-t border-stone-100">
                    <div className="text-xs text-stone-500">每次成本</div>
                    <div className="text-lg font-bold text-stone-700">¥{result.costPerUse.toFixed(1)}</div>
                  </div>
                </div>
                <div className="bg-white rounded-2xl p-4 shadow-sm">
                  <div className="text-xs text-stone-500 mb-1">租用方案</div>
                  <div className="text-2xl font-bold text-stone-900">¥{result.totalRentCost}</div>
                  <div className="text-xs text-stone-400 mt-1">一年总成本</div>
                  <div className="mt-3 pt-3 border-t border-stone-100">
                    <div className="text-xs text-stone-500">单次租金</div>
                    <div className="text-lg font-bold text-stone-700">¥{result.rentCostPerTime}</div>
                  </div>
                </div>
              </div>

              {/* 结论 */}
              <div className={`rounded-2xl p-5 text-center ${
                result.advice.includes('购买') ? 'bg-primary-500 text-white' : 'bg-amber-500 text-white'
              }`}>
                <div className="text-sm opacity-80 mb-1">我的建议是</div>
                <div className="text-3xl font-bold mb-3">{result.advice}</div>
                <p className="text-sm opacity-90 leading-relaxed">{result.detailReason}</p>
              </div>

              {/* 平衡点提示 */}
              <div className="bg-white rounded-2xl p-4 shadow-sm">
                <div className="flex items-center text-sm text-stone-600">
                  <IconInfo />
                  <span className="ml-2">用满 <strong className="text-primary-600">{result.breakEven}次</strong> 就回本了</span>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==================== 搬家转卖页面 ====================
    function MovingPage({ onBack }) {
      const [itemName, setItemName] = useState('');
      const [originalPrice, setOriginalPrice] = useState('');
      const [useMonths, setUseMonths] = useState('');
      const [condition, setCondition] = useState(8);
      const [tone, setTone] = useState('casual');
      const [showResult, setShowResult] = useState(false);
      const [copied, setCopied] = useState({ title: false, body: false });

      const tones = [
        { id: 'casual', label: '🧘 佛系版', desc: '冷淡不夸张，有缘人来' },
        { id: 'enthusiastic', label: '🔥 热情版', desc: '活泼有感染力，多emoji' },
        { id: 'professional', label: '📋 专业版', desc: '列参数讲细节，理性描述' },
      ];

      const generateCopy = () => {
        if (!itemName || !originalPrice || !useMonths) return;
        setShowResult(true);
        setCopied({ title: false, body: false });
      };

      const generateContent = () => {
        const conditionText = condition >= 9 ? '几乎全新' : condition >= 7 ? '八成新' : condition >= 5 ? '五成新' : '旧物';
        const discount = Math.round((1 - (condition / 10) * 0.3) * 100);
        const suggestedPrice = Math.round(Number(originalPrice) * (condition / 10) * 0.5);
        
        let title = '';
        let body = '';
        let tags = [];

        if (tone === 'casual') {
          title = `${itemName}，${useMonths}个月，${conditionText}`;
          body = `自用的${itemName}，买了${useMonths}个月，${conditionText}。\n\n现在要搬家，东西太多带不走，转给需要的人。\n\n原价¥${originalPrice}，现在¥${suggestedPrice}出。\n\n不议价，不包邮，自取优先。\n\n有意私信，看到会回。`;
          tags = ['自用', '搬家', conditionText, '自取'];
        } else if (tone === 'enthusiastic') {
          title = `姐妹们！${itemName}血亏转让！手慢无！`;
          body = `啊啊啊！要搬家了带不走！😭\n\n这个${itemName}我才买了${useMonths}个月！${conditionText}！✨\n\n当时花了我¥${originalPrice}买的！现在只要¥${suggestedPrice}！💰\n\n真的血亏！但搬家东西太多实在带不走了！🚚\n\n求一个有缘人带走它！我可以送你一些小礼物！🎁\n\n快来私信我！秒回！💬`;
          tags = ['血亏', '几乎全新', '搬家急出', '送小礼物', '秒回'];
        } else {
          title = `[转让] ${itemName} ${conditionText} ¥${suggestedPrice}`;
          body = `物品名称：${itemName}\n购买时间：${useMonths}个月前\n物品成色：${conditionText}（${condition}/10）\n原价：¥${originalPrice}\n转让价：¥${suggestedPrice}（约${discount}折）\n\n物品描述：\n功能完好，无明显损坏。因搬家不便携带，现转让给需要的朋友。\n\n交易方式：\n支持自提，如需邮寄运费自理。\n\n联系方式：\n私信详询，可拍实物视频。`;
          tags = [conditionText, '功能完好', '可小刀', '支持自提'];
        }

        return { title, body, suggestedPrice, tags };
      };

      const content = generateContent();

      const handleCopy = (type, text) => {
        navigator.clipboard.writeText(text);
        setCopied({ ...copied, [type]: true });
        setTimeout(() => setCopied({ ...copied, [type]: false }), 2000);
      };

      return (
        <div className="page-enter pb-8">
          <Header title="搬家转卖" subtitle="没用的东西变成钱，文案不用自己想" onBack={onBack} />

          {!showResult ? (
            <>
              {/* 物品名 */}
              <div className="bg-white rounded-2xl p-5 mb-4 shadow-sm">
                <label className="block text-sm font-medium text-stone-700 mb-2">物品名称</label>
                <input
                  type="text"
                  value={itemName}
                  onChange={(e) => setItemName(e.target.value)}
                  placeholder="比如：宜家书桌、小米空气净化器..."
                  className="w-full px-4 py-3 rounded-xl border border-stone-200 focus:outline-none focus:border-primary-400 text-stone-900"
                />
              </div>

              {/* 原价 */}
              <div className="bg-white rounded-2xl p-5 mb-4 shadow-sm">
                <label className="block text-sm font-medium text-stone-700 mb-2">原价（元）</label>
                <input
                  type="number"
                  value={originalPrice}
                  onChange={(e) => setOriginalPrice(e.target.value)}
                  placeholder="输入购买时的价格"
                  className="w-full px-4 py-3 rounded-xl border border-stone-200 focus:outline-none focus:border-primary-400 text-stone-900"
                />
              </div>

              {/* 使用时长 */}
              <div className="bg-white rounded-2xl p-5 mb-4 shadow-sm">
                <label className="block text-sm font-medium text-stone-700 mb-2">用了多少个月</label>
                <input
                  type="number"
                  value={useMonths}
                  onChange={(e) => setUseMonths(e.target.value)}
                  placeholder="用了多久"
                  className="w-full px-4 py-3 rounded-xl border border-stone-200 focus:outline-none focus:border-primary-400 text-stone-900"
                />
              </div>

              {/* 成色 */}
              <div className="bg-white rounded-2xl p-5 mb-4 shadow-sm">
                <label className="block text-sm font-medium text-stone-700 mb-3">
                  成色：<span className="text-primary-600 font-bold">{condition}/10</span>
                </label>
                <input
                  type="range"
                  min="1"
                  max="10"
                  value={condition}
                  onChange={(e) => setCondition(Number(e.target.value))}
                  className="w-full"
                />
                <div className="flex justify-between text-xs text-stone-400 mt-1">
                  <span>战损版</span>
                  <span>全新</span>
                </div>
              </div>

              {/* 语气 */}
              <div className="bg-white rounded-2xl p-5 mb-6 shadow-sm">
                <label className="block text-sm font-medium text-stone-700 mb-3">文案风格</label>
                <div className="space-y-2">
                  {tones.map(t => (
                    <button
                      key={t.id}
                      onClick={() => setTone(t.id)}
                      className={`w-full p-3 rounded-xl text-left btn-press border-2 transition-all ${
                        tone === t.id
                          ? 'border-primary-500 bg-primary-50'
                          : 'border-transparent bg-stone-50 hover:bg-stone-100'
                      }`}
                    >
                      <div className="flex items-center">
                        <span className="font-medium text-stone-900">{t.label}</span>
                      </div>
                      <div className="text-xs text-stone-500 mt-1">{t.desc}</div>
                    </button>
                  ))}
                </div>
              </div>

              {/* 生成按钮 */}
              <button
                onClick={generateCopy}
                disabled={!itemName || !originalPrice || !useMonths}
                className={`btn-press w-full py-4 rounded-2xl font-bold text-lg shadow-lg transition-colors ${
                  itemName && originalPrice && useMonths
                    ? 'bg-primary-500 text-white shadow-primary-200 hover:bg-primary-600'
                    : 'bg-stone-200 text-stone-400 cursor-not-allowed'
                }`}
              >
                <div className="flex items-center justify-center">
                  <IconSparkles />
                  <span className="ml-2">生成闲鱼文案</span>
                </div>
              </button>
            </>
          ) : (
            <div className="space-y-4">
              {/* 标题 */}
              <div className="bg-white rounded-2xl p-5 shadow-sm">
                <div className="flex items-center justify-between mb-3">
                  <span className="text-sm font-medium text-stone-700">标题</span>
                  <button
                    onClick={() => handleCopy('title', content.title)}
                    className={`btn-press flex items-center space-x-1 px-3 py-1.5 rounded-lg text-sm transition-colors ${
                      copied.title ? 'bg-primary-100 text-primary-700' : 'bg-stone-100 text-stone-600 hover:bg-stone-200'
                    }`}
                  >
                    {copied.title ? <IconCheck /> : <IconCopy />}
                    <span>{copied.title ? '已复制' : '复制'}</span>
                  </button>
                </div>
                <p className="text-stone-900 font-medium">{content.title}</p>
              </div>

              {/* 正文 */}
              <div className="bg-white rounded-2xl p-5 shadow-sm">
                <div className="flex items-center justify-between mb-3">
                  <span className="text-sm font-medium text-stone-700">正文</span>
                  <button
                    onClick={() => handleCopy('body', content.body)}
                    className={`btn-press flex items-center space-x-1 px-3 py-1.5 rounded-lg text-sm transition-colors ${
                      copied.body ? 'bg-primary-100 text-primary-700' : 'bg-stone-100 text-stone-600 hover:bg-stone-200'
                    }`}
                  >
                    {copied.body ? <IconCheck /> : <IconCopy />}
                    <span>{copied.body ? '已复制' : '复制'}</span>
                  </button>
                </div>
                <pre className="text-stone-900 text-sm whitespace-pre-wrap font-sans leading-relaxed">{content.body}</pre>
              </div>

              {/* 建议价格 */}
              <div className="bg-stone-900 rounded-2xl p-5 text-white text-center">
                <div className="text-sm text-stone-400 mb-1">建议售价</div>
                <div className="text-4xl font-bold text-primary-400">¥{content.suggestedPrice}</div>
                <div className="text-sm text-stone-400 mt-2">
                  原价¥{originalPrice} · 用了{useMonths}个月 · 成色{condition}/10
                </div>
              </div>

              {/* 推荐标签 */}
              <div className="bg-white rounded-2xl p-5 shadow-sm">
                <span className="text-sm font-medium text-stone-700">推荐标签</span>
                <div className="flex flex-wrap gap-2 mt-3">
                  {content.tags.map((tag, i) => (
                    <span key={i} className="px-3 py-1.5 bg-primary-50 text-primary-700 rounded-full text-sm">
                      #{tag}
                    </span>
                  ))}
                </div>
              </div>

              {/* 重新生成 */}
              <button
                onClick={() => setShowResult(false)}
                className="btn-press w-full bg-white text-primary-600 py-3 rounded-2xl font-medium border-2 border-primary-200 hover:bg-primary-50"
              >
                重新填写
              </button>
            </div>
          )}
        </div>
      );
    }

    // ==================== 底部导航 ====================
    function BottomNav({ currentView, setCurrentView }) {
      const navItems = [
        { id: 'home', label: '首页', icon: <IconHome /> },
        { id: 'recommend', label: '好物', icon: <IconShopping /> },
        { id: 'buyOrRent', label: '买租', icon: <IconRefresh /> },
        { id: 'moving', label: '转卖', icon: <IconPackage /> },
      ];

      return (
        <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-100 px-4 py-2 z-50">
          <div className="max-w-md mx-auto flex justify-around">
            {navItems.map(item => (
              <button
                key={item.id}
                onClick={() => setCurrentView(item.id)}
                className={`flex flex-col items-center py-1 px-3 rounded-xl transition-colors ${
                  currentView === item.id ? 'text-primary-600' : 'text-stone-400 hover:text-stone-600'
                }`}
              >
                <div className="w-6 h-6">{item.icon}</div>
                <span className="text-xs mt-0.5">{item.label}</span>
              </button>
            ))}
          </div>
        </nav>
      );
    }

    // ==================== 主应用组件 ====================
    function App() {
      const [currentView, setCurrentView] = useState('home');

      const handleBack = () => setCurrentView('home');

      return (
        <div className="max-w-md mx-auto min-h-screen bg-stone-50 relative">
          {/* 主内容区域 */}
          <main className="px-4 pt-6 pb-24">
            {currentView === 'home' && <HomePage setCurrentView={setCurrentView} />}
            {currentView === 'recommend' && <RecommendPage onBack={handleBack} />}
            {currentView === 'buyOrRent' && <BuyOrRentPage onBack={handleBack} />}
            {currentView === 'moving' && <MovingPage onBack={handleBack} />}
          </main>

          {/* 底部导航 */}
          <BottomNav currentView={currentView} setCurrentView={setCurrentView} />
        </div>
      );
    }

    // ==================== 渲染应用 ====================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
